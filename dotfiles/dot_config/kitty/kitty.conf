font_family      JetBrains Mono Nerd Font
font_size        9.0
bold_font        auto
italic_font      auto
bold_italic_font auto

mouse_hide_wait        2.0
cursor_shape           block
cursor_trail           3
scrollback_lines       100000
enable_audio_bell      no
update_check_interval  0
url_color              #0087bd
url_style              dotted
background_blur        0
confirm_os_window_close 0

kitty_mod alt

# Scrolling
map kitty_mod+k scroll_line_up
map kitty_mod+j scroll_line_down
map kitty_mod+u scroll_page_up
map kitty_mod+d scroll_page_down

# Font size
map kitty_mod+shift+k change_font_size all +1.0
map kitty_mod+shift+j change_font_size all -1.0
map kitty_mod+shift+home change_font_size all 0

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# Tabs
map kitty_mod+t new_tab
map kitty_mod+l next_tab
map kitty_mod+h previous_tab
map kitty_mod+shift+l move_tab_forward
map kitty_mod+shift+h move_tab_backward

shell_integration enabled
