[preferred]
default=gnome;gtk;
org.freedesktop.impl.portal.Access=gtk;
org.freedesktop.impl.portal.Notification=gtk;
org.freedesktop.impl.portal.Secret=gnome-keyring;
# xdg-desktop-portal-gnome delegates FileChooser to org.gnome.Nautilus over
# D-Bus, but Nautilus isn't installed in this image (yazi is the file
# manager), so that delegation fails with "the name is not activatable".
# Route FileChooser to xdg-desktop-portal-gtk instead, which implements it
# directly.
org.freedesktop.impl.portal.FileChooser=gtk;
